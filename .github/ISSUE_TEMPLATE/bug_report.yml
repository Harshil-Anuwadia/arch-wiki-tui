name: Bug Report
description: Report a bug to help us improve archwiki-tui
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report!
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: Also tell us what you expected to happen.
      placeholder: Tell us what you were doing and what went wrong.
    validations:
      required: true
  - type: textarea
    id: reproduction-steps
    attributes:
      label: Reproduction steps
      description: How do we trigger this bug?
      placeholder: |
        1. Run `archwiki ...`
        2. Press `...`
        3. See error
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: archwiki-tui version
      description: Output of `archwiki --version`
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Terminal Emulator, Go version (if building from source)
      placeholder: |
        OS: Arch Linux
        Terminal: Alacritty
        Go: 1.25.0
    validations:
      required: true
